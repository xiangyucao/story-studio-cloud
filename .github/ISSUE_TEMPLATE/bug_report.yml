name: Bug report
description: Report a reproducible problem in Story Studio Cloud.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Story Studio Cloud. Please search existing issues before submitting a new report.

        **Privacy:** Do not include private manuscript text, passwords, API keys, MCP access tokens, or personal information.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Public website or library
        - Sign-in or account access
        - Works dashboard
        - Outline and chapter editor
        - Characters, relationships, or story memory
        - Import or export
        - MCP connection
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you were trying to do.
      placeholder: A clear, concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. Enter ...
        4. See the problem
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and operating system
      placeholder: Chrome 136 on Windows 11
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Every time
        - Often
        - Sometimes
        - Only once
        - Not sure
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, console errors, or a minimal sample with all private content removed.

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed private story content, credentials, and personal information.
          required: true
